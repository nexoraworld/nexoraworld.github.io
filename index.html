<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA v8.5 Quantum AI Core</title>
<style>
:root{
  --dark:#0f0f14;
  --light:#f5f1e6;
  --cyan:#00f2ff;
  --hover:#0ff;
  --card-dark:#111;
  --card-light:#ddd;
  --text-dark:#fff;
  --text-light:#111;
}
body{
  margin:0; font-family:Arial,sans-serif;
  background:var(--dark); color:var(--text-dark);
  transition:0.3s; overflow-x:hidden;
}
body.light{ background:var(--light); color:var(--text-light);}
.content{
  padding:20px 30px;
}
.header{
  display:flex; flex-direction:column; align-items:flex-start;
  gap:10px;
}
.header-buttons{
  display:flex; flex-wrap:wrap; gap:10px;
}
.header-buttons button{
  padding:8px 12px; border:none; border-radius:5px;
  background:var(--cyan); color:#000; cursor:pointer;
}
select, input{
  padding:8px; border-radius:5px; border:1px solid var(--cyan);
}
.grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:20px; margin-top:20px;
}
.card{
  background:var(--card-dark); padding:15px; border-radius:10px;
  border:1px solid var(--cyan); transition:0.3s; color:inherit;
}
.card:hover{ box-shadow:0 0 20px var(--hover); transform:translateY(-3px);}
.card button{
  margin-top:5px; padding:5px 8px; border:none; border-radius:5px;
  cursor:pointer; background:var(--cyan); color:#000;
}
.theme-toggle{
  position:fixed; bottom:20px; right:20px;
  width:60px; height:60px; border-radius:50%; font-size:24px;
  cursor:pointer; box-shadow:0 0 20px var(--cyan);
}
/* MODAL */
.modal-backdrop{
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.6); z-index:2000; justify-content:center; align-items:center;
}
.modal{
  background:var(--card-dark); padding:20px; border-radius:10px;
  display:flex; flex-direction:column; gap:10px; width:300px;
}
.modal input{padding:8px; border-radius:5px; border:1px solid var(--cyan);}
.modal button{
  padding:8px; cursor:pointer; background:var(--cyan); border:none;
  color:#000; border-radius:5px;
}
/* RESPONSIVE */
@media screen and (max-width:768px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:15px;}
}
@media screen and (max-width:480px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
}
</style>
</head>
<body>

<div class="content">
  <div class="header">
    <h2>NEXORA Quantum Core</h2>
    <div class="header-buttons">
      <button id="loginBtn">Login / Register</button>
      <button id="addBtn">Add Product</button>
      <button id="profileBtn">Profile</button>
      <button id="feedBtn">Follow Feed</button>
    </div>
    <div class="header-buttons">
      <input id="search" placeholder="Search...">
      <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="AI">AI</option>
        <option value="SciFi">SciFi</option>
        <option value="Other">Other</option>
      </select>
    </div>
  </div>

  <div class="grid" id="productGrid"></div>
</div>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalForm">
    <h3>Add Product</h3>
    <input id="modalName" placeholder="Product Name">
    <input id="modalPrice" placeholder="Price">
    <button onclick="submitProduct()">Add</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const API_URL="https://nexora-backend-j2v3.onrender.com";
let token=localStorage.getItem("token")||null;
let currentUser=localStorage.getItem("currentUser")||null;
let follows=JSON.parse(localStorage.getItem("follows"))||{};
let ws=null;

// THEME
function toggleTheme(){
  document.body.classList.toggle("light");
  document.querySelector(".theme-toggle").textContent=document.body.classList.contains("light")?"☀":"🌙";
  document.querySelectorAll(".card").forEach(c=>c.style.color="inherit");
}

// LOGIN
async function openLogin(){
  const username=prompt("Username:");
  const password=prompt("Password:");
  if(!username||!password)return alert("Enter both");
  try{
    const res=await fetch(API_URL+"/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
    const data=await res.json();
    if(data.token){
      token=data.token; currentUser=username;
      localStorage.setItem("token",token);
      localStorage.setItem("currentUser",currentUser);
      alert("Logged in!"); renderProducts(); initWebSocket();
    } else alert(data.message||"Login failed");
  }catch(err){console.log(err);}
}

// RENDER PRODUCTS
async function renderProducts(){
  try{
    const res=await fetch(API_URL+"/products",{headers: token?{"Authorization":"Bearer "+token}:{}} );
    const products=await res.json();
    const grid=document.getElementById("productGrid");
    grid.innerHTML="";
    const searchVal=document.getElementById("search").value.toLowerCase();
    const catVal=document.getElementById("categoryFilter").value;
    products.filter(p=> (catVal==="all"||p.cat===catVal) && p.name.toLowerCase().includes(searchVal))
    .forEach(p=>{
      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`<h3>${p.name}</h3><p>Price: ${p.price}</p><p>By: ${p.owner}</p>`;
      if(token){
        const followBtn=document.createElement("button");
        followBtn.textContent="Follow";
        followBtn.onclick=()=>followUser(p.owner);
        card.appendChild(followBtn);
        if(p.owner===currentUser){
          const delBtn=document.createElement("button");
          delBtn.textContent="Delete";
          delBtn.onclick=()=>deleteProduct(p._id);
          card.appendChild(delBtn);
        }
      }
      grid.appendChild(card);
    });
  }catch(err){console.log(err);}
}

// ADD PRODUCT MODAL
function openAdd(){if(!token)return alert("Login first");document.getElementById("modalBackdrop").style.display="flex";}
function closeModal(){document.getElementById("modalBackdrop").style.display="none";}
async function submitProduct(){
  const name=document.getElementById("modalName").value;
  const price=document.getElementById("modalPrice").value;
  if(!name||!price)return alert("Enter both fields");
  const res=await fetch(API_URL+"/products",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({name,price,owner:currentUser})});
  if(res.ok){alert("Product added!");closeModal();renderProducts();}
  else alert("Error adding product!");
}

// DELETE
async function deleteProduct(id){if(!token)return alert("Login first");await fetch(API_URL+"/products/"+id,{method:"DELETE",headers:{"Authorization":"Bearer "+token}});renderProducts();}

// FOLLOW
function followUser(user){if(!currentUser)return alert("Login first");if(user===currentUser)return alert("Cannot follow yourself");if(!follows[currentUser])follows[currentUser]=[];if(!follows[currentUser].includes(user))follows[currentUser].push(user);localStorage.setItem("follows",JSON.stringify(follows));alert("Followed "+user);}

// PROFILE
async function openProfile(){if(!token)return alert("Login first");const res=await fetch(API_URL+"/products",{headers:{"Authorization":"Bearer "+token}});const products=await res.json();const myProducts=products.filter(p=>p.owner===currentUser);const grid=document.getElementById("productGrid");grid.innerHTML="";myProducts.forEach(p=>{const card=document.createElement("div");card.className="card";card.innerHTML=`<h3>${p.name}</h3><p>Price: ${p.price}</p>`;grid.appendChild(card);});}

// FEED
async function viewFeed(){if(!token)return alert("Login first");const res=await fetch(API_URL+"/products",{headers:{"Authorization":"Bearer "+token}});const products=await res.json();const grid=document.getElementById("productGrid");grid.innerHTML="";const feed=products.filter(p=>follows[currentUser]?.includes(p.owner));feed.forEach(p=>{const card=document.createElement("div");card.className="card";card.innerHTML=`<h3>${p.name}</h3><p>Price: ${p.price}</p><p>By: ${p.owner}</p>`;grid.appendChild(card);});}

// SEARCH & FILTER
document.getElementById("search").onkeyup=renderProducts;
document.getElementById("categoryFilter").onchange=renderProducts;

// WEBSOCKET
function initWebSocket(){if(ws)ws.close();ws=new WebSocket("wss://nexora-backend-j2v3.onrender.com/ws");ws.onmessage=e=>renderProducts();}

// EVENTS
document.getElementById("loginBtn").onclick=openLogin;
document.getElementById("addBtn").onclick=openAdd;
document.getElementById("profileBtn").onclick=openProfile;
document.getElementById("feedBtn").onclick=viewFeed;

// START
renderProducts();
if(token)initWebSocket();
</script>

</body>
</html>
