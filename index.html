<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Add Product Test</title>
</head>
<body>

<button onclick="openAdd()">Add Product</button>
<div id="productList"></div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let currentUser = prompt("Enter your username for test") || "TestUser";
let openaiKey = ""; // opsiyonel: AI key varsa buraya ekle

async function generateAI(promptText){
  if(!openaiKey) return "Default AI description for: " + promptText;
  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+openaiKey
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {role:"system",content:"Generate product title, description, 3 hashtags."},
          {role:"user",content:promptText}
        ]
      })
    });
    const data = await res.json();
    return data?.choices?.[0]?.message?.content || "";
  }catch(e){ return "AI error"; }
}

async function openAdd(){
  let title = prompt("Product Title");
  if(!title) return;
  let cat = prompt("Category (AI/SciFi)") || "";
  let useAI = confirm("Use AI to generate description?");
  let desc = "";
  if(useAI){
    let idea = prompt("Describe your product idea");
    desc = await generateAI(idea);
  } else {
    desc = prompt("Description") || "";
  }
  let price = prompt("Price") || "0";
  let newProduct = {name:title, cat, desc, price, owner:currentUser, id:Date.now()};
  products.push(newProduct);
  localStorage.setItem("products", JSON.stringify(products));
  renderProducts();
}

function renderProducts(){
  let list = document.getElementById("productList");
  list.innerHTML = "";
  products.forEach(p=>{
    list.innerHTML += `<div><strong>${p.name}</strong> | ${p.cat} | ${p.desc} | $${p.price} | by ${p.owner}</div>`;
  });
}

renderProducts();
</script>
</body>
</html>
