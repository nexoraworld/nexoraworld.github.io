<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA v7.3 Quantum AI Core</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f14;
  color:white;
}
.content{
  padding:30px;
}
.btn{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#111;
  color:#fff;
  margin:5px;
  cursor:pointer;
  box-shadow:0 0 10px cyan;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}
.card{
  background:#111;
  padding:15px;
  border-radius:10px;
  border:1px solid cyan;
}
</style>
</head>
<body>

<div class="content">
<h2>NEXORA Products</h2>

<button class="btn" onclick="openLogin()">Login / Register</button>
<button class="btn" onclick="openAdd()">Add Product</button>
<button class="btn" onclick="openProfile()">Profile</button>
<button class="btn" onclick="viewFeed()">Follow Feed</button>

<div class="grid" id="productGrid"></div>
</div>

<script>

/* ================= API ================= */
const API_URL = "https://nexora-backend-j2v3.onrender.com";

/* ================= STATE ================= */
let token = localStorage.getItem("token") || null;
let currentUser = localStorage.getItem("currentUser") || null;
let follows = JSON.parse(localStorage.getItem("follows")) || {};

/* ================= JWT LOGIN ================= */
async function openLogin(){
  const username = prompt("Username:");
  const password = prompt("Password:");

  if(!username || !password) return;

  try{
    const res = await fetch(API_URL + "/auth/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username,password})
    });

    const data = await res.json();

    if(data.token){
      token = data.token;
      currentUser = username;
      localStorage.setItem("token",token);
      localStorage.setItem("currentUser",currentUser);
      alert("Logged in with JWT");
      renderProducts();
    } else {
      alert(data.message || "Login failed");
    }

  }catch(err){
    console.log(err);
  }
}

/* ================= PRODUCTS ================= */
async function renderProducts(){

  try{
    const res = await fetch(API_URL + "/products",{
      headers:{
        "Authorization":"Bearer "+token
      }
    });
    const products = await res.json();

    productGrid.innerHTML="";

    products.forEach(p=>{
      productGrid.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>Price: ${p.price}</p>
        <p>By: ${p.owner}</p>
        ${p.owner===currentUser?`<button onclick="deleteProduct('${p._id}')">Delete</button>`:""}
        <button onclick="followUser('${p.owner}')">Follow</button>
      </div>`;
    });

  }catch(err){
    console.log(err);
  }
}

/* ================= ADD PRODUCT ================= */
async function openAdd(){
  if(!token) return alert("Login first");

  const name = prompt("Product name");
  const price = prompt("Price");
  if(!name || !price) return;

  await fetch(API_URL + "/products",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
      name:name,
      price:price,
      owner:currentUser
    })
  });

  renderProducts();
}

/* ================= DELETE PRODUCT ================= */
async function deleteProduct(id){
  if(!token) return alert("Login first");

  await fetch(API_URL + "/products/"+id,{
    method:"DELETE",
    headers:{
      "Authorization":"Bearer "+token
    }
  });

  renderProducts();
}

/* ================= FOLLOW ================= */
function followUser(user){
  if(!currentUser) return alert("Login first");
  if(user===currentUser) return alert("You cannot follow yourself");

  if(!follows[currentUser]) follows[currentUser]=[];
  if(!follows[currentUser].includes(user)) follows[currentUser].push(user);

  localStorage.setItem("follows",JSON.stringify(follows));
  alert("Followed "+user);
}

/* ================= PROFILE ================= */
async function openProfile(){
  if(!token) return alert("Login first");

  const res = await fetch(API_URL + "/products",{
    headers:{
      "Authorization":"Bearer "+token
    }
  });
  const products = await res.json();
  const myProducts = products.filter(p=>p.owner===currentUser);

  alert("My Products: "+myProducts.map(p=>p.name).join(", "));
}

/* ================= FOLLOW FEED ================= */
async function viewFeed(){
  if(!token) return alert("Login first");

  const res = await fetch(API_URL + "/products",{
    headers:{
      "Authorization":"Bearer "+token
    }
  });
  const products = await res.json();

  const feedProducts = products.filter(p=>{
    return follows[currentUser]?.includes(p.owner);
  });

  productGrid.innerHTML="";

  feedProducts.forEach(p=>{
    productGrid.innerHTML += `
    <div class="card">
      <h3>${p.name}</h3>
      <p>Price: ${p.price}</p>
      <p>By: ${p.owner}</p>
    </div>`;
  });
}

/* ================= START ================= */
renderProducts();

</script>

</body>
</html>
