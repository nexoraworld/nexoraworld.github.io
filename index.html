<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA v7.4 Quantum AI Core</title>
<style>
:root{
  --dark:#0f0f14;
  --light:#f5f1e6;
  --cyan:#00f2ff;
}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--dark);
  color:#fff;
}
body.light{background:var(--light); color:#111;}
.content{margin-left:220px; padding:30px;}
.btn{
  padding:10px 20px; border:none; border-radius:20px; background:#111; color:#fff; margin:5px; cursor:pointer; box-shadow:0 0 10px var(--cyan);
}
.btn:hover{box-shadow:0 0 25px var(--cyan);}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px;}
.card{background:#111; padding:15px; border-radius:10px; border:1px solid var(--cyan);}
.theme-toggle{position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:50%; font-size:24px; cursor:pointer; box-shadow:0 0 20px var(--cyan);}
</style>
</head>
<body>
<div class="content">
<h2>NEXORA Quantum Core</h2>
<button class="btn" id="loginBtn">Login / Register</button>
<button class="btn" id="addBtn">Add Product</button>
<button class="btn" id="profileBtn">Profile</button>
<button class="btn" id="feedBtn">Follow Feed</button>
<div class="grid" id="productGrid"></div>
</div>
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<script>
const API_URL="https://nexora-backend-j2v3.onrender.com";
let token = localStorage.getItem("token") || null;
let currentUser = localStorage.getItem("currentUser") || null;
let follows = JSON.parse(localStorage.getItem("follows")) || {};

function toggleTheme(){
  document.body.classList.toggle("light");
  document.querySelector(".theme-toggle").textContent=document.body.classList.contains("light")?"☀":"🌙";
}

/* ===== LOGIN / REGISTER ===== */
async function openLogin(){
  const username = prompt("Username:");
  const password = prompt("Password:");
  if(!username||!password) return alert("Enter both");

  try{
    const res = await fetch(API_URL+"/auth/login",{ 
      method:"POST", 
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username,password})
    });
    const data = await res.json();
    if(data.token){
      token = data.token;
      currentUser=username;
      localStorage.setItem("token",token);
      localStorage.setItem("currentUser",currentUser);
      alert("Logged in!");
      renderProducts();
    } else alert(data.message||"Login failed");
  }catch(err){console.log(err);}
}

/* ===== RENDER PRODUCTS ===== */
async function renderProducts(){
  try{
    const res = await fetch(API_URL+"/products",{
      headers: token?{"Authorization":"Bearer "+token}:{}
    });
    const products = await res.json();
    const grid=document.getElementById("productGrid");
    grid.innerHTML="";
    products.forEach(p=>{
      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <h3>${p.name}</h3>
        <p>Price: ${p.price}</p>
        <p>By: ${p.owner}</p>
      `;
      if(token){
        const followBtn=document.createElement("button");
        followBtn.textContent="Follow";
        followBtn.onclick=()=>followUser(p.owner);
        card.appendChild(followBtn);

        if(p.owner===currentUser){
          const delBtn=document.createElement("button");
          delBtn.textContent="Delete";
          delBtn.onclick=()=>deleteProduct(p._id);
          card.appendChild(delBtn);
        }
      }
      grid.appendChild(card);
    });
  }catch(err){console.log(err);}
}

/* ===== ADD PRODUCT ===== */
async function openAdd(){
  if(!token) return alert("Login first");
  const name=prompt("Product name");
  const price=prompt("Price");
  if(!name||!price) return;
  await fetch(API_URL+"/products",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
    body:JSON.stringify({name,price,owner:currentUser})
  });
  renderProducts();
}

/* ===== DELETE PRODUCT ===== */
async function deleteProduct(id){
  if(!token) return alert("Login first");
  await fetch(API_URL+"/products/"+id,{
    method:"DELETE",
    headers:{"Authorization":"Bearer "+token}
  });
  renderProducts();
}

/* ===== FOLLOW ===== */
function followUser(user){
  if(!currentUser) return alert("Login first");
  if(user===currentUser) return alert("Cannot follow yourself");
  if(!follows[currentUser]) follows[currentUser]=[];
  if(!follows[currentUser].includes(user)) follows[currentUser].push(user);
  localStorage.setItem("follows",JSON.stringify(follows));
  alert("Followed "+user);
}

/* ===== PROFILE ===== */
async function openProfile(){
  if(!token) return alert("Login first");
  const res = await fetch(API_URL+"/products",{headers:{"Authorization":"Bearer "+token}});
  const products = await res.json();
  const myProducts = products.filter(p=>p.owner===currentUser);
  const grid=document.getElementById("productGrid");
  grid.innerHTML="";
  myProducts.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`<h3>${p.name}</h3><p>Price: ${p.price}</p>`;
    grid.appendChild(card);
  });
}

/* ===== FOLLOW FEED ===== */
async function viewFeed(){
  if(!token) return alert("Login first");
  const res = await fetch(API_URL+"/products",{headers:{"Authorization":"Bearer "+token}});
  const products = await res.json();
  const grid=document.getElementById("productGrid");
  grid.innerHTML="";
  const feed = products.filter(p=>follows[currentUser]?.includes(p.owner));
  feed.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`<h3>${p.name}</h3><p>Price: ${p.price}</p><p>By: ${p.owner}</p>`;
    grid.appendChild(card);
  });
}

/* ===== EVENTS ===== */
document.getElementById("loginBtn").onclick=openLogin;
document.getElementById("addBtn").onclick=openAdd;
document.getElementById("profileBtn").onclick=openProfile;
document.getElementById("feedBtn").onclick=viewFeed;

/* ===== START ===== */
renderProducts();
</script>
</body>
</html>
