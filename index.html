<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA Quantum Core</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<style>
:root{
  --dark:#0f0f14;
  --light:#f5f1e6;
  --card:#1a1a1f;
  --accent:#ff9900;
  --text:#ffffff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--dark);
  color:var(--text);
}

body.light{
  background:#f5f5f5;
  color:#111;
}

.content{padding:20px;}

.btn{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:var(--accent);
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
}

.card{
  background:var(--card);
  padding:12px;
  border-radius:10px;
}

body.light .card{
  background:#eee;
}

.theme-toggle{
  position:fixed;
  bottom:15px;
  right:15px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:var(--accent);
}

/* MODAL */
.modal-backdrop{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

.modal{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:300px;
  position:relative;
}

body.light .modal{
  background:#fff;
  color:#000;
}

.close{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
}

.input-box{
  position:relative;
}

.preview{
  position:absolute;
  right:10px;
  top:8px;
  font-size:10px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="content">
<h2>NEXORA</h2>

<button id="loginBtn" class="btn">Login</button>
<button id="addBtn" class="btn">Add</button>

<div class="grid" id="productGrid"></div>
</div>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<!-- LOGIN MODAL -->
<div class="modal-backdrop" id="loginModal">
<div class="modal">
<div class="close" onclick="closeLogin()">✖</div>

<h3>Login / Register</h3>

<div class="input-box">
<input id="email" placeholder="Email veya Telefon">
<div class="preview" id="emailPreview"></div>
</div>

<div class="input-box">
<input id="password" type="password" maxlength="9" placeholder="Şifre">
<div class="preview" id="passPreview"></div>
</div>

<button onclick="register()">Kayıt Ol</button>
<button onclick="login()">Giriş Yap</button>

</div>
</div>

<!-- ADD MODAL -->
<div class="modal-backdrop" id="addModal">
<div class="modal">
<div class="close" onclick="closeAdd()">✖</div>

<input id="pname" placeholder="Ürün adı">
<input id="pprice" placeholder="Fiyat">

<button onclick="addProduct()">Ekle</button>

</div>
</div>

<script>
// FIREBASE CONFIG (BURAYA KENDİ KEYİNİ KOY)
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyC43X-Z1t5V5A4Gauotr7k4aNgTyHbb-Mk",
  authDomain: "nexora-8af81.firebaseapp.com",
  projectId: "nexora-8af81",
  storageBucket: "nexora-8af81.firebasestorage.app",
  messagingSenderId: "215728074189",
  appId: "1:215728074189:web:4c18a6687d5d01d3dbe884",
  measurementId: "G-QM132D68K0"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let currentUser = null;

// THEME
function toggleTheme(){
  document.body.classList.toggle("light");
}

// INPUT PREVIEW
email.oninput=()=>{
  emailPreview.innerText=email.value;
}
password.oninput=()=>{
  passPreview.innerText="*".repeat(password.value.length);
}

// LOGIN MODAL
loginBtn.onclick=()=>loginModal.style.display="flex";
function closeLogin(){loginModal.style.display="none";}

// ADD MODAL
addBtn.onclick=()=>{
  if(!currentUser)return alert("Login first");
  addModal.style.display="flex";
}
function closeAdd(){addModal.style.display="none";}

// REGISTER
function register(){
  const mail=email.value;
  const pass=password.value;

  if(pass.length>9)return alert("Max 9 karakter");

  auth.createUserWithEmailAndPassword(mail,pass)
  .then(()=>{
    alert("Kayıt başarılı");
  })
  .catch(e=>alert(e.message));
}

// LOGIN
function login(){
  const mail=email.value;
  const pass=password.value;

  auth.signInWithEmailAndPassword(mail,pass)
  .then(user=>{
    currentUser=user.user.email;
    alert("Giriş başarılı");
    closeLogin();
  })
  .catch(e=>alert(e.message));
}

// PRODUCTS (LOCAL)
let products=[];

function addProduct(){
  const name=pname.value;
  const price=pprice.value;

  products.push({
    name,price,owner:currentUser
  });

  render();
  closeAdd();
}

function render(){
  productGrid.innerHTML="";
  products.forEach((p,i)=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
    <h3>${p.name}</h3>
    <p>${p.price}</p>
    <p>${p.owner}</p>
    <button onclick="del(${i})">Delete</button>
    <button>Follow</button>
    `;

    productGrid.appendChild(div);
  });
}

function del(i){
  products.splice(i,1);
  render();
}
</script>

</body>
</html>
