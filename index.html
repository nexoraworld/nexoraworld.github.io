<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
:root{
--dark:#0f0f14;
--light:#f5f1e6;
--cyan:#00f2ff;
--card:#1a1a1f;
--cardLight:#eaeaea;
}

body{margin:0;font-family:Arial;background:var(--dark);color:#fff;overflow-x:hidden;}
body.light{background:var(--light);color:#111;}

.content{padding:30px;}
.btn{margin:10px;padding:8px 12px;border:none;border-radius:6px;background:var(--cyan);cursor:pointer;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:15px;
border-radius:10px;
}
body.light .card{background:var(--cardLight);}

/* SEARCH */
.searchBox{position:relative;display:inline-block;}
.searchBox input{padding:8px;width:200px;}
.searchBox span{
position:absolute;right:8px;top:6px;cursor:pointer;font-size:18px;
}

/* THEME */
.theme-toggle{
position:fixed;bottom:20px;right:20px;
width:60px;height:60px;border-radius:50%;
background:var(--cyan);font-size:22px;
}

/* MODAL */
.modal-backdrop{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;align-items:center;
}
.modal{
background:#222;padding:20px;border-radius:10px;width:300px;position:relative;
}
body.light .modal{background:#fff;color:#000;}
.close{position:absolute;right:10px;top:10px;cursor:pointer;}

/* INPUT EFFECT */
.input-wrap{position:relative;}
.input-wrap input{width:100%;padding:8px;}
.fake{
position:absolute;right:5px;top:5px;font-size:12px;opacity:0.6;
}
</style>
</head>

<body>

<div class="content">

<h2>NEXORA</h2>

<button class="btn" onclick="openLogin()">Login</button>
<button class="btn" onclick="openAdd()">Add Product</button>

<div class="searchBox">
<input id="search" placeholder="Search...">
<span onclick="clearSearch()">×</span>
</div>

<div class="grid" id="productGrid"></div>

</div>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<!-- LOGIN -->
<div class="modal-backdrop" id="loginModal">
<div class="modal">
<div class="close" onclick="closeLogin()">✖</div>

<h3>Login</h3>

<div class="input-wrap">
<input id="loginUser" oninput="fakeUser(this)">
<div class="fake" id="fakeUser"></div>
</div>

<div class="input-wrap">
<input type="password" id="loginPass" maxlength="9" oninput="fakePass(this)">
<div class="fake" id="fakePass"></div>
</div>

<button onclick="doLogin()">Giriş</button>
<button onclick="doRegister()">Kayıt Ol</button>

</div>
</div>

<!-- ADD -->
<div class="modal-backdrop" id="addModal">
<div class="modal">
<div class="close" onclick="closeAdd()">✖</div>

<input id="modalName" placeholder="Ürün adı">
<input id="modalPrice" placeholder="Fiyat">

<button onclick="submitProduct()">Ekle</button>

</div>
</div>

<script>
// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyC43X-Z1t5V5A4Gauotr7k4aNgTyHbb-Mk",
authDomain:"nexora-8af81.firebaseapp.com",
projectId:"nexora-8af81"
});
const auth=firebase.auth();

// API
const API_URL="https://nexora-backend-j2v3.onrender.com";

let token=null;
let currentUser=null;

// THEME
function toggleTheme(){
document.body.classList.toggle("light");
}

// SEARCH
function clearSearch(){
search.value="";
renderProducts();
}
search.oninput=renderProducts;

// LOGIN UI
function openLogin(){loginModal.style.display="flex";}
function closeLogin(){loginModal.style.display="none";}

// INPUT EFFECT
function fakeUser(el){
fakeUser.innerText=el.value.split("").map(c=>c.toLowerCase()).join("");
}
function fakePass(el){
fakePass.innerText=el.value.split("").map(()=>"*").join("");
}

// REGISTER (MAIL DOĞRULAMA)
function doRegister(){
const user=loginUser.value;
const pass=loginPass.value;

auth.createUserWithEmailAndPassword(user,pass)
.then(c=>{
c.user.sendEmailVerification();
alert("Mail gönderildi!");
})
.catch(e=>alert(e.message));
}

// LOGIN
async function doLogin(){
const user=loginUser.value;
const pass=loginPass.value;

const cred=await auth.signInWithEmailAndPassword(user,pass);

if(!cred.user.emailVerified){
alert("Mail doğrula!");
return;
}

const res=await fetch(API_URL+"/auth/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user,password:pass})
});

const data=await res.json();

if(data.token){
token=data.token;
currentUser=user;
renderProducts();
closeLogin();
}
}

// ADD
function openAdd(){
if(!token)return openLogin();
addModal.style.display="flex";
}
function closeAdd(){addModal.style.display="none";}

async function submitProduct(){
await fetch(API_URL+"/products",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({
name:modalName.value,
price:modalPrice.value,
owner:currentUser
})
});
closeAdd();
renderProducts();
}

// PRODUCTS
async function renderProducts(){
const res=await fetch(API_URL+"/products");
const products=await res.json();

productGrid.innerHTML="";

products.forEach(p=>{
const c=document.createElement("div");
c.className="card";

c.innerHTML=`<h3>${p.name}</h3><p>${p.price}</p><p>${p.owner}</p>`;

const d=document.createElement("button");
d.innerText="Delete";
d.onclick=()=>deleteProduct(p._id);

const f=document.createElement("button");
f.innerText="Follow";

c.appendChild(d);
c.appendChild(f);

productGrid.appendChild(c);
});
}

// DELETE
async function deleteProduct(id){
await fetch(API_URL+"/products/"+id,{
method:"DELETE",
headers:{"Authorization":"Bearer "+token}
});
renderProducts();
}

// START
renderProducts();
</script>

</body>
</html>
