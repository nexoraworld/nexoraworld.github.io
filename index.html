<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA v8.6 STABLE</title>

<style>
:root{
  --dark:#0f0f14;
  --light:#f5f1e6;
  --cyan:#00f2ff;
  --hover:#0ff;
  --card-dark:#111;
  --text-dark:#fff;
  --text-light:#111;
}
body{
  margin:0;
  font-family:Arial;
  background:var(--dark);
  color:var(--text-dark);
}
body.light{
  background:var(--light);
  color:var(--text-light);
}
.content{padding:30px;}
.btn{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#111;
  color:#fff;
  margin:10px;
  cursor:pointer;
  box-shadow:0 0 10px var(--cyan);
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}
.card{
  background:var(--card-dark);
  padding:15px;
  border-radius:10px;
  border:1px solid var(--cyan);
}
.theme-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
}
</style>
</head>

<body>

<div class="content">
<h2>NEXORA Quantum Core</h2>

<button class="btn" onclick="openLogin()">Login</button>
<button class="btn" onclick="openAdd()">Add Product</button>

<div class="grid" id="productGrid"></div>
</div>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<script>

const API_URL="https://nexora-backend-j2v3.onrender.com";

let currentUser = localStorage.getItem("currentUser") || null;

/* ===== THEME ===== */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ===== LOGIN FIX ===== */
function openLogin(){
  const username = prompt("Username:");
  if(!username) return;

  currentUser = username;
  localStorage.setItem("currentUser", username);

  alert("Login OK ✅");
}

/* ===== PRODUCTS ===== */
async function renderProducts(){
  const res = await fetch(API_URL+"/products");
  const products = await res.json();

  productGrid.innerHTML="";

  products.forEach(p=>{
    productGrid.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>Price: ${p.price}</p>
        <p>By: ${p.owner || "unknown"}</p>
      </div>
    `;
  });
}

/* ===== ADD PRODUCT FIX ===== */
async function openAdd(){

  if(!currentUser){
    alert("Önce login ol");
    return;
  }

  const name = prompt("Product name");
  const price = prompt("Price");

  if(!name || !price) return;

  const res = await fetch(API_URL+"/products",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      name:name,
      price:price,
      owner:currentUser
    })
  });

  if(res.ok){
    alert("Ürün eklendi ✅");
    renderProducts();
  }else{
    alert("Hata var ❌");
  }
}

/* ===== START ===== */
renderProducts();

</script>

</body>
</html>
