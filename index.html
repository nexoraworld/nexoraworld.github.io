<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f0f14;color:#fff;}
body.light{background:#f5f5f5;color:#111;}

.content{padding:20px;}
.btn{margin:5px;padding:8px;border:none;border-radius:6px;background:#ff9900;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px;}

.card{background:#1a1a1f;padding:12px;border-radius:10px;}
body.light .card{background:#eee;}

.theme-toggle{
position:fixed;bottom:15px;right:15px;
width:50px;height:50px;border-radius:50%;
background:#ff9900;
}

.modal-backdrop{
display:none;position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;align-items:center;
}
.modal{
background:#222;padding:20px;border-radius:10px;width:300px;position:relative;
}
body.light .modal{background:#fff;color:#000;}
.close{position:absolute;right:10px;top:10px;cursor:pointer;}
</style>
</head>

<body>

<div class="content">
<h2>NEXORA</h2>

<button id="loginBtn" class="btn">Login</button>
<button id="addBtn" class="btn">Add Product</button>

<input id="search" placeholder="Search...">
<button onclick="clearSearch()">×</button>

<div class="grid" id="productGrid"></div>
</div>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<!-- LOGIN MODAL -->
<div class="modal-backdrop" id="loginModal">
<div class="modal">
<div class="close" onclick="closeLogin()">✖</div>

<h3>Login</h3>

<input id="loginUser" placeholder="Gmail veya Telefon">
<input id="loginPass" type="password" maxlength="9" placeholder="Şifre">

<button onclick="doLogin()">Giriş</button>
<button onclick="doRegister()">Kayıt Ol</button>

</div>
</div>

<!-- ADD PRODUCT -->
<div class="modal-backdrop" id="addModal">
<div class="modal">
<div class="close" onclick="closeAdd()">✖</div>

<input id="modalName" placeholder="Ürün adı">
<input id="modalPrice" placeholder="Fiyat">

<button onclick="submitProduct()">Ekle</button>

</div>
</div>

<script>
// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyC43X-Z1t5V5A4Gauotr7k4aNgTyHbb-Mk",
  authDomain: "nexora-8af81.firebaseapp.com",
  projectId: "nexora-8af81",
  storageBucket: "nexora-8af81.firebasestorage.app",
  messagingSenderId: "215728074189",
  appId: "1:215728074189:web:4c18a6687d5d01d3dbe884",
  measurementId: "G-QM132D68K0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ===== API =====
const API_URL="https://nexora-backend-j2v3.onrender.com";

let token=null;
let currentUser=null;

// ===== THEME =====
function toggleTheme(){
  document.body.classList.toggle("light");
}

// ===== LOGIN =====
loginBtn.onclick=()=>loginModal.style.display="flex";
function closeLogin(){loginModal.style.display="none";}

// 🔥 REGISTER (MAIL DOĞRULAMALI)
function doRegister(){
  const user=loginUser.value;
  const pass=loginPass.value;

  if(pass.length>9)return alert("Max 9 karakter");

  auth.createUserWithEmailAndPassword(user,pass)
  .then((cred)=>{
    cred.user.sendEmailVerification();
    alert("📩 Doğrulama maili gönderildi! Gmailini kontrol et.");
  })
  .catch(e=>alert(e.message));
}

// LOGIN
async function doLogin(){
  const user=loginUser.value;
  const pass=loginPass.value;

  try{
    const cred = await auth.signInWithEmailAndPassword(user,pass);

    if(!cred.user.emailVerified){
      alert("❗ Önce mailini doğrula!");
      return;
    }

    const res=await fetch(API_URL+"/auth/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username:user,password:pass})
    });

    const data=await res.json();

    if(data.token){
      token=data.token;
      currentUser=user;
      localStorage.setItem("token",token);
      alert("Giriş başarılı");
      closeLogin();
      renderProducts();
    }

  }catch(e){alert(e.message);}
}

// ===== ADD =====
addBtn.onclick=()=>{
  if(!token)return loginModal.style.display="flex";
  addModal.style.display="flex";
};
function closeAdd(){addModal.style.display="none";}

async function submitProduct(){
  const name=modalName.value;
  const price=modalPrice.value;

  await fetch(API_URL+"/products",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({name,price,owner:currentUser})
  });

  closeAdd();
  renderProducts();
}

// ===== PRODUCTS =====
async function renderProducts(){
  const res=await fetch(API_URL+"/products");
  const products=await res.json();

  productGrid.innerHTML="";

  products.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
    <h3>${p.name}</h3>
    <p>${p.price}</p>
    <p>${p.owner}</p>
    `;

    const del=document.createElement("button");
    del.innerText="Delete";
    del.onclick=()=>deleteProduct(p._id);

    const fol=document.createElement("button");
    fol.innerText="Follow";

    div.appendChild(del);
    div.appendChild(fol);

    productGrid.appendChild(div);
  });
}

// ===== DELETE =====
async function deleteProduct(id){
  await fetch(API_URL+"/products/"+id,{
    method:"DELETE",
    headers:{"Authorization":"Bearer "+token}
  });
  renderProducts();
}

// ===== SEARCH =====
search.oninput=renderProducts;
function clearSearch(){
  search.value="";
  renderProducts();
}

// ===== START =====
renderProducts();
</script>

</body>
</html>
