<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f14;
color:white;
}

.content{
padding:30px;
}

.btn{
padding:10px 20px;
border:none;
border-radius:20px;
background:#111;
color:#fff;
margin:5px;
cursor:pointer;
box-shadow:0 0 10px cyan;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
border:1px solid cyan;
}

</style>
</head>

<body>

<div class="content">

<h2>NEXORA Products</h2>

<button class="btn" onclick="openAdd()">Add Product</button>

<div class="grid" id="productGrid"></div>

</div>

<script>

/* ================= API ================= */

const API_URL = "https://nexora-backend-j2v3.onrender.com";

/* ================= PRODUCTS ================= */

async function renderProducts(){

try{

const res = await fetch(API_URL + "/products");

const products = await res.json();

productGrid.innerHTML="";

products.forEach(p=>{

productGrid.innerHTML += `

<div class="card">

<h3>${p.name}</h3>

<p>Price: ${p.price}</p>

</div>

`;

});

}catch(err){

console.log(err);

}

}

/* ================= ADD PRODUCT ================= */

async function openAdd(){

let name = prompt("Product name");

let price = prompt("Price");

if(!name || !price) return;

await fetch(API_URL + "/products",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
price:price
})

});

renderProducts();

}

/* ================= START ================= */

renderProducts();

</script>

</body>
</html>
