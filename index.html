<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA v7.8 Quantum AI Core</title>
<style>
:root{
  --dark:#0f0f14;
  --light:#f5f1e6;
  --cyan:#00f2ff;
  --hover:#00ffff33;
  --text-dark:#111;
  --text-light:#fff;
}
body{
  margin:0; font-family:Arial, sans-serif;
  background:var(--dark); color:var(--text-light);
  transition:0.4s; overflow-x:hidden;
}
body.light{background:var(--light); color:var(--text-dark);}

/* Sidebar */
.sidebar{
  position:fixed; left:0; top:0;
  height:100%; width:220px; background:#111;
  padding-top:60px; transition:0.4s; overflow:hidden;
}
.sidebar.collapsed{width:70px;}
.arrow-control{
  position:fixed; left:0; top:50%;
  transform:translateY(-50%);
  display:flex; flex-direction:column;
  align-items:center; cursor:pointer; z-index:1000;
}
.arrow{font-size:22px;transition:0.4s; color:var(--cyan);}
.dots{display:flex; flex-direction:column; gap:8px; margin:10px 0; opacity:0; transition:0.4s;}
.dot{width:8px; height:8px; border-radius:50%; animation:glow 1.5s infinite alternate;}
.dot:nth-child(1){background:red;} .dot:nth-child(2){background:green;}
.dot:nth-child(3){background:yellow;} .dot:nth-child(4){background:purple;}
@keyframes glow{from{box-shadow:0 0 5px currentColor;} to{box-shadow:0 0 20px currentColor;}}
.arrow-control.active .arrow:first-child{transform:translateY(-20px);}
.arrow-control.active .arrow:last-child{transform:translateY(20px);}
.arrow-control.active .dots{opacity:1;}

/* Content */
.content{margin-left:220px; padding:30px; transition:0.4s;}
.sidebar.collapsed ~ .content{margin-left:70px;}

/* Buttons & grid */
.btn{
  padding:10px 20px; border:none; border-radius:20px;
  background:#111; color:#fff; margin:5px; cursor:pointer;
  box-shadow:0 0 10px var(--cyan); transition:0.3s;
}
.btn:hover{box-shadow:0 0 25px var(--cyan); background:var(--hover);}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px;}
.card{
  background:#111; padding:15px; border-radius:10px;
  border:1px solid var(--cyan); transition:0.3s; position:relative;
}
.card:hover{box-shadow:0 0 20px var(--cyan); transform:translateY(-3px);}
.card button{margin-top:5px; cursor:pointer; transition:0.3s;}
.card button:hover{background:var(--hover);}
.card .hashtags{margin-top:5px; font-size:12px; color:#0ff;}

/* Inputs */
input, select{padding:8px; margin:5px; border-radius:10px; border:none; outline:none; box-shadow:0 0 5px var(--cyan);}

/* Drag drop style */
.dragging{opacity:0.5; transform:scale(0.95); transition:0.2s;}

/* Tooltip */
.btn[title]:hover::after{
  content: attr(title);
  position:absolute; background:#111; color:#0ff;
  padding:4px 8px; border-radius:5px;
  top:-30px; left:50%; transform:translateX(-50%);
  white-space:nowrap; font-size:12px; z-index:1000;
}

/* Responsive */
@media(max-width:768px){
  .content{margin-left:0; padding:15px;}
  .sidebar{width:70px;}
}
.theme-toggle{position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:50%; font-size:24px; cursor:pointer; box-shadow:0 0 20px var(--cyan);}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar"></div>
<div class="arrow-control" id="arrowControl" onclick="toggleMenu()">
  <div class="arrow">▲</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="arrow">▼</div>
</div>

<div class="content">
<h2>NEXORA Quantum Core</h2>

<!-- Filters -->
<input type="text" id="searchInput" placeholder="Search products...">
<select id="categoryFilter">
  <option value="all">All Categories</option>
  <option value="AI">AI</option>
  <option value="SciFi">SciFi</option>
  <option value="Other">Other</option>
</select>

<!-- Main buttons -->
<button class="btn" id="loginBtn" title="Login or register">Login / Register</button>
<button class="btn" id="addBtn" title="Add a new product with AI options">Add Product</button>
<button class="btn" id="profileBtn" title="View your products">Profile</button>
<button class="btn" id="feedBtn" title="See your follow feed">Follow Feed</button>

<div class="grid" id="productGrid"></div>
</div>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<script>
const API_URL="https://nexora-backend-j2v3.onrender.com";
let token = localStorage.getItem("token") || null;
let currentUser = localStorage.getItem("currentUser") || null;
let follows = JSON.parse(localStorage.getItem("follows")) || {};
let openaiKey = localStorage.getItem("openaiKey") || "";

/* ===== MENU ===== */
function toggleMenu(){
  sidebar.classList.toggle("collapsed");
  arrowControl.classList.toggle("active");
  setTimeout(renderProducts,300); // grid adaptasyonu
}

/* ===== THEME ===== */
function toggleTheme(){
  document.body.classList.toggle("light");
  let isLight = document.body.classList.contains("light");
  document.querySelector(".theme-toggle").textContent = isLight ? "☀" : "🌙";
  document.querySelectorAll(".card").forEach(c=>{
    c.style.color = isLight ? "var(--text-dark)" : "var(--text-light)";
  });
}

/* ===== LOGIN / REGISTER ===== */
async function openLogin(){
  const username = prompt("Username:");
  const password = prompt("Password:");
  if(!username||!password) return alert("Enter both");
  try{
    const res = await fetch(API_URL+"/auth/login",{ 
      method:"POST", 
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username,password})
    });
    const data = await res.json();
    if(data.token){
      token = data.token; currentUser=username;
      localStorage.setItem("token",token);
      localStorage.setItem("currentUser",currentUser);
      alert("Logged in!");
      renderProducts();
    } else alert(data.message||"Login failed");
  }catch(err){console.log(err);}
}

/* ===== AI DESCRIPTION + HASHTAGS ===== */
async function generateAI(descPrompt){
  if(!openaiKey) return {desc:descPrompt,hashtags:[]};
  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+openaiKey},
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[{role:"system",content:"Generate product title, description and 3 hashtags in JSON {desc:'...',hashtags:['#tag1','#tag2','#tag3']}."},{role:"user",content:descPrompt}]
      })
    });
    const data = await res.json();
    const content = data.choices?.[0]?.message?.content;
    return content ? JSON.parse(content.replace(/'/g,'"')) : {desc:descPrompt,hashtags:[]};
  } catch(err){console.log(err); return {desc:descPrompt,hashtags:[]};}
}

/* ===== RENDER PRODUCTS ===== */
async function renderProducts(products=null){
  if(!products){
    const res = await fetch(API_URL+"/products",{headers: token?{"Authorization":"Bearer "+token}:{}}).catch(()=>[]);
    products = await res.json().catch(()=>[]);
  }
  const grid=document.getElementById("productGrid");
  grid.innerHTML="";
  let searchVal = document.getElementById("searchInput").value.toLowerCase();
  let catVal = document.getElementById("categoryFilter").value;

  products.filter(p=>{
    return (catVal==="all"||p.cat===catVal) && (p.name||"").toLowerCase().includes(searchVal);
  }).forEach(p=>{
    const card=document.createElement("div");
    card.className="card";
    card.draggable=true;
    card.innerHTML=`
      <h3>${p.name}</h3>
      <p>Price: ${p.price}</p>
      <p>By: ${p.owner}</p>
      <p>${p.desc||""}</p>
      <div class="hashtags">${(p.hashtags||[]).join(' ')}</div>
    `;
    // Drag-drop events
    card.addEventListener('dragstart',()=>card.classList.add('dragging'));
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));

    if(token){
      const followBtn=document.createElement("button");
      followBtn.textContent="Follow";
      followBtn.onclick=()=>followUser(p.owner);
      followBtn.title="Follow this user";
      card.appendChild(followBtn);

      if(p.owner===currentUser){
        const delBtn=document.createElement("button");
        delBtn.textContent="Delete";
        delBtn.onclick=()=>deleteProduct(p._id);
        delBtn.title="Delete your product";
        card.appendChild(delBtn);
      }
    }
    grid.appendChild(card);
  });
}

/* ===== ADD PRODUCT ===== */
async function openAdd(){
  if(!token) return alert("Login first");
  const name = prompt("Product name"); if(!name) return;
  const useAI = confirm("Generate description and hashtags using AI?");
  let desc="", hashtags=[];
  if(useAI){
    const idea = prompt("Describe your product idea briefly:");
    const aiResult = await generateAI(idea);
    desc = aiResult.desc; hashtags = aiResult.hashtags;
  } else {
    desc = prompt("Product description:");
    hashtags = prompt("Enter hashtags separated by commas","").split(",").map(t=>t.trim()).filter(t=>t);
  }
  const price = prompt("Price"); if(!price) return;
  const category = prompt("Category (AI/SciFi/Other)","AI");
  await fetch(API_URL+"/products",{method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({name,price,desc,cat:category,owner:currentUser,hashtags})});
  renderProducts();
}

/* ===== DELETE PRODUCT ===== */
async function deleteProduct(id){
  if(!token) return alert("Login first");
  await fetch(API_URL+"/products/"+id,{method:"DELETE", headers:{"Authorization":"Bearer "+token}});
  renderProducts();
}

/* ===== FOLLOW ===== */
function followUser(user){
  if(!currentUser) return alert("Login first");
  if(user===currentUser) return alert("Cannot follow yourself");
  if(!follows[currentUser]) follows[currentUser]=[];
  if(!follows[currentUser].includes(user)) follows[currentUser].push(user);
  localStorage.setItem("follows",JSON.stringify(follows));
  updateFeed();
}

/* ===== PROFILE ===== */
async function openProfile(){
  if(!token) return alert("Login first");
  const res = await fetch(API_URL+"/products",{headers:{"Authorization":"Bearer "+token}});
  const products = await res.json();
  const myProducts = products.filter(p=>p.owner===currentUser);
  renderProducts(myProducts);
}

/* ===== FOLLOW FEED + WEBSOCKET ===== */
let socket;
function initSocket(){
  socket = new WebSocket("wss://nexora-backend-j2v3.onrender.com/feed");
  socket.onmessage = function(event){
    const data = JSON.parse(event.data);
    if(data.type==="new_product" || data.type==="update_product"){
      if(follows[currentUser]?.includes(data.owner)){
        renderProducts([data]);
      }
    }
  }
}
function updateFeed(){viewFeed();}

async function viewFeed(){
  if(!token) return alert("Login first");
  const res = await fetch(API_URL+"/products",{headers:{"Authorization":"Bearer "+token}});
  const products = await res.json();
  const feed = products.filter(p=>follows[currentUser]?.includes(p.owner));
  renderProducts(feed);
}

/* ===== EVENTS ===== */
document.getElementById("loginBtn").onclick=openLogin;
document.getElementById("addBtn").onclick=openAdd;
document.getElementById("profileBtn").onclick=openProfile;
document.getElementById("feedBtn").onclick=viewFeed;
document.getElementById("searchInput").onkeyup=renderProducts;
document.getElementById("categoryFilter").onchange=renderProducts;

/* ===== START ===== */
renderProducts();
initSocket();
</script>
</body>
</html>
